                    type: string
                  haOobAvailabilityZone:
                    description: OOB HA availability zone.
                    type: string
                  haOobManagementSubnet:
                    description: OOB HA management subnet.
                    type: string
                  haPrivateModeSubnetZone:
                    description: Private Mode HA subnet availability zone.
                    type: string
                  haSoftwareVersion:
                    description: ha_software_version can be used to set the desired
                      software version of the HA gateway. If set, we will attempt
                      to update the gateway to the specified version. If left blank,
                      the gateway software version will continue to be managed through
                      the aviatrix_controller_config resource.
                    type: string
                  haSubnet:
                    description: HA Subnet. Required if enabling HA for AWS/AWSGov/AWSChina/Azure/AzureChina/OCI/Alibaba
                      Cloud. Optional if enabling HA for GCP.
                    type: string
                  haZone:
                    description: HA Zone. Required if enabling HA for GCP. Optional
                      for Azure.
                    type: string
                  imageVersion:
                    description: image_version can be used to set the desired image
                      version of the gateway. If set, we will attempt to update the
                      gateway to the specified version.
                    type: string
                  includedAdvertisedSpokeRoutes:
                    description: A list of comma separated CIDRs to be advertised
                      to on-prem as 'Included CIDR List'. When configured, it will
                      replace all advertised routes from this VPC.
                    type: string
                  insaneMode:
                    description: 'Enable Insane Mode for Spoke Gateway. Valid values:
                      true, false. Supported for AWS/AWSGov, GCP, Azure and OCI. If
                      insane mode is enabled, gateway size has to at least be c5 size
                      for AWS and Standard_D3_v2 size for Azure.'
                    type: boolean
                  insaneModeAz:
                    description: AZ of subnet being created for Insane Mode Spoke
                      Gateway. Required if insane_mode is enabled for AWS cloud.
                    type: string
                  learnedCidrsApprovalMode:
                    description: 'Set the learned CIDRs approval mode for BGP Spoke
                      Gateway. Only valid when ''enable_learned_cidrs_approval'' is
                      set to true. Currently, only ''gateway'' is supported: learned
                      CIDR approval applies to ALL connections. Default value: ''gateway''.'
                    type: string
                  localAsNumber:
                    description: Changes the Aviatrix BGP Spoke Gateway ASN number
                      before you setup Aviatrix BGP Spoke Gateway connection configurations.
                    type: string
                  manageHaGateway:
                    description: 'This parameter is a switch used to determine whether
                      or not to manage spoke ha gateway using the aviatrix_spoke_gateway
                      resource. If this is set to false, managing spoke ha gateway
                      must be done using the aviatrix_spoke_ha_gateway resource. Valid
                      values: true, false. Default value: true.'
                    type: boolean
                  monitorExcludeList:
                    description: A set of monitored instance ids. Only valid when
                      'enable_monitor_gateway_subnets' = true.
                    items:
                      type: string
                    type: array
                  oobAvailabilityZone:
                    description: OOB subnet availability zone.
                    type: string
                  oobManagementSubnet:
                    description: OOB management subnet.
                    type: string
                  prependAsPath:
                    description: List of AS numbers to populate BGP AP_PATH field
                      when it advertises to VGW or peer devices. Only valid for BGP
                      Spoke Gateway
                    items:
                      type: string
                    type: array
                  privateModeLbVpcId:
                    description: Private Mode controller load balancer vpc_id.  Required
                      when private mode is enabled for the Controller.
                    type: string
                  privateModeSubnetZone:
                    description: Subnet availability zone. Required when Private Mode
                      is enabled on the Controller and cloud_type is AWS.
                    type: string
                  rxQueueSize:
                    description: Gateway ethernet interface RX queue size. Supported
                      for AWS related clouds only. Applies on HA as well if enabled.
                    type: string
                  singleAzHa:
                    description: Set to 'enabled' if this feature is desired.
                    type: boolean
                  singleIpSnat:
                    description: Specify whether to enable Source NAT feature in 'single_ip'
                      mode on the gateway or not.
                    type: boolean
                  softwareVersion:
                    description: software_version can be used to set the desired software
                      version of the gateway. If set, we will attempt to update the
                      gateway to the specified version. If left blank, the gateway
                      software version will continue to be managed through the aviatrix_controller_config
                      resource.
                    type: string
                  spokeBgpManualAdvertiseCidrs:
                    description: Intended CIDR list to be advertised to external BGP
                      router.
                    items:
                      type: string
                    type: array
                  spotPrice:
                    description: Price for spot instance. NOT supported for production
                      deployment.
                    type: string
                  subnet:
                    description: Public Subnet Info.
                    type: string
                  tags:
                    additionalProperties:
                      type: string
                    description: A map of tags to assign to the spoke gateway.
                    type: object
                  tunnelDetectionTime:
                    description: The IPSec tunnel down detection time for the Spoke
                      Gateway.
                    type: number
                  vpcId:
                    description: VPC-ID/VNet-Name of cloud provider.
                    type: string
                  vpcReg:
                    description: Region of cloud provider.
                    type: string
                  zone:
                    description: Availability Zone. Only available for Azure (8),
                      Azure GOV (32) and Azure CHINA (2048). Must be in the form 'az-n',
                      for example, 'az-2'.
                    type: string
                required:
                - accountName
                - cloudType
                - gwName
                - gwSize
                - subnet
                - vpcId
                - vpcReg
                type: object
