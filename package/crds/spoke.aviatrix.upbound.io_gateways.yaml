  annotations:
    controller-gen.kubebuilder.io/version: v0.8.0
  creationTimestamp: null
  name: gateways.spoke.aviatrix.upbound.io
spec:
  group: spoke.aviatrix.upbound.io
  names:
    categories:
    - crossplane
    - managed
    - aviatrix
    kind: Gateway
    listKind: GatewayList
    plural: gateways
    singular: gateway
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Gateway is the Schema for the Gateways API. <no value>
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: GatewaySpec defines the desired state of Gateway
            properties:
              deletionPolicy:
                default: Delete
                description: DeletionPolicy specifies what will happen to the underlying
                  external when this managed resource is deleted - either "Delete"
                  or "Orphan" the external resource.
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                properties:
                  accountName:
                    description: This parameter represents the name of a Cloud-Account
                      in Aviatrix controller.
                    type: string
                  allocateNewEip:
                    description: If false, reuse an idle address in Elastic IP pool
                      for this gateway. Otherwise, allocate a new Elastic IP and use
                      it for this gateway.
                    type: boolean
                  approvedLearnedCidrs:
                    description: Approved learned CIDRs for BGP Spoke Gateway. Available
                      as of provider version R2.21+.
                    items:
                      type: string
                    type: array
                  availabilityDomain:
                    description: Availability domain for OCI.
                    type: string
                  azureEipNameResourceGroup:
                    description: The name of the public IP address and its resource
                      group in Azure to assign to this Spoke Gateway.
                    type: string
                  bgpEcmp:
                    description: Enable Equal Cost Multi Path (ECMP) routing for the
                      next hop for BGP Spoke Gateway.
                    type: boolean
                  bgpHoldTime:
                    description: BGP Hold Time for BGP Spoke Gateway. Unit is in seconds.
                      Valid values are between 12 and 360.
                    type: number
                  bgpPollingTime:
                    description: BGP route polling time for BGP Spoke Gateway. Unit
                      is in seconds. Valid values are between 10 and 50.
                    type: number
                  cloudType:
                    description: Type of cloud service provider.
                    type: number
                  customerManagedKeysSecretRef:
                    description: Customer managed key ID.
                    properties:
                      key:
                        description: The key to select.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  customizedSpokeVpcRoutes:
                    description: A list of comma separated CIDRs to be customized
                      for the spoke VPC routes. When configured, it will replace all
                      learned routes in VPC routing tables, including RFC1918 and
                      non-RFC1918 CIDRs. It applies to this spoke gateway only.
                    type: string
                  disableRoutePropagation:
                    description: 'Disables route propagation on BGP Spoke to attached
                      Transit Gateway. Default: false.'
                    type: boolean
                  eip:
                    description: Required when allocate_new_eip is false. It uses
                      specified EIP for this gateway.
                    type: string
                  enableActiveStandby:
                    description: Enables Active-Standby Mode, available only with
                      HA enabled for BGP Spoke Gateway.
                    type: boolean
                  enableActiveStandbyPreemptive:
                    description: Enables Preemptive Mode for Active-Standby, available
                      only with Active-Standby enabled.
                    type: boolean
                  enableAutoAdvertiseS2CCidrs:
                    description: Automatically advertise remote CIDR to Aviatrix Transit
                      Gateway when route based Site2Cloud Tunnel is created.
                    type: boolean
                  enableBgp:
                    description: 'Enable BGP. Default: false.'
                    type: boolean
                  enableEncryptVolume:
                    description: 'Enable encrypt gateway EBS volume. Only supported
                      for AWS provider. Valid values: true, false. Default value:
                      false.'
                    type: boolean
                  enableJumboFrame:
                    description: 'Enable jumbo frame support for spoke gateway. Valid
                      values: true or false. Default value: true.'
                    type: boolean
                  enableLearnedCidrsApproval:
                    description: 'Switch to enable/disable learned CIDR approval for
                      BGP Spoke Gateway. Valid values: true, false.'
                    type: boolean
                  enableMonitorGatewaySubnets:
                    description: 'Enable [monitor gateway subnets](https://docs.aviatrix.com/HowTos/gateway.html#monitor-gateway-subnet).
                      Only valid for cloud_type = 1 (AWS) or 256 (AWSGov). Valid values:
                      true, false. Default value: false.'
                    type: boolean
                  enablePreserveAsPath:
                    description: Enable preserve as_path when advertising manual summary
                      cidrs on BGP spoke gateway.
                    type: boolean
                  enablePrivateOob:
                    description: Enable private OOB.
                    type: boolean
                  enablePrivateVpcDefaultRoute:
                    description: Config Private VPC Default Route.
                    type: boolean
                  enableSkipPublicRouteTableUpdate:
                    description: Skip Public Route Table Update.
                    type: boolean
                  enableSpotInstance:
                    description: Enable spot instance. NOT supported for production
                      deployment.
                    type: boolean
                  enableVpcDnsServer:
                    description: 'Enable vpc_dns_server for Gateway. Valid values:
                      true, false.'
                    type: boolean
                  faultDomain:
                    description: Fault domain for OCI.
                    type: string
                  filteredSpokeVpcRoutes:
                    description: A list of comma separated CIDRs to be filtered from
                      the spoke VPC route table. When configured, filtering CIDR(s)
                      or it’s subnet will be deleted from VPC routing tables as well
                      as from spoke gateway’s routing table. It applies to this spoke
                      gateway only.
                    type: string
                  gwName:
                    description: Name of the gateway which is going to be created.
                    type: string
                  gwSize:
                    description: Size of the gateway instance.
                    type: string
                  haAvailabilityDomain:
                    description: HA availability domain for OCI.
                    type: string
                  haAzureEipNameResourceGroup:
                    description: The name of the public IP address and its resource
                      group in Azure to assign to the HA Spoke Gateway.
                    type: string
                  haEip:
                    description: Public IP address that you want assigned to the HA
                      Spoke Gateway.
                    type: string
                  haFaultDomain:
                    description: HA fault domain for OCI.
                    type: string
                  haGwSize:
                    description: HA Gateway Size.
                    type: string
                  haImageVersion:
                    description: ha_image_version can be used to set the desired image
                      version of the HA gateway. If set, we will attempt to update
                      the gateway to the specified version.
                    type: string
                  haInsaneModeAz:
